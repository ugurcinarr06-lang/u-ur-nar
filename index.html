<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sirius Mirror — AI Smart Mirror Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-primary: #080808;
        --bg-secondary: #111111;
        --bg-card: #161616;
        --accent-blue: #3b82f6;
        --accent-purple: #8b5cf6;
        --accent-gold: #f59e0b;
        --accent-cyan: #06b6d4;
        --text-primary: #f0f0f0;
        --text-secondary: #888888;
        --border: rgba(255,255,255,0.08);
        --glass: rgba(255,255,255,0.04);
      }
      * { box-sizing: border-box; }
      body {
        font-family: 'Space Grotesk', 'Inter', sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        padding: 0;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      .glass {
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.08);
      }
      .glass-strong {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.12);
      }

      .gradient-text {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .gradient-text-gold {
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .glow-blue { box-shadow: 0 0 30px rgba(59,130,246,0.15); }
      .glow-purple { box-shadow: 0 0 30px rgba(139,92,246,0.15); }
      .glow-gold { box-shadow: 0 0 30px rgba(245,158,11,0.15); }

      @keyframes pulse-ring {
        0% { transform: scale(0.95); opacity: 0.8; }
        70% { transform: scale(1.05); opacity: 0; }
        100% { transform: scale(0.95); opacity: 0; }
      }
      @keyframes scan-line {
        0% { top: 0%; }
        100% { top: 100%; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes orbit {
        from { transform: rotate(0deg) translateX(60px) rotate(0deg); }
        to { transform: rotate(360deg) translateX(60px) rotate(-360deg); }
      }
      @keyframes body-track {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(1.1); opacity: 1; }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes particle-float {
        0% { transform: translateY(100vh) translateX(0px); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-100px) translateX(20px); opacity: 0; }
      }
      @keyframes rotate-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes bg-shift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
      }
      @keyframes ripple-effect {
        to { transform: translate(-50%, -50%) scale(4); opacity: 0; }
      }

      .animate-float { animation: float 4s ease-in-out infinite; }
      .animate-pulse-ring { animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite; }
      .animate-scan { animation: scan-line 2.5s linear infinite; }
      .animate-orbit { animation: orbit 8s linear infinite; }
      .animate-body-track { animation: body-track 1.5s ease-in-out infinite; }
      .animate-fadeInUp { animation: fadeInUp 0.6s ease-out forwards; }
      .animate-rotate-slow { animation: rotate-slow 20s linear infinite; }
      .animate-bg-shift { animation: bg-shift 8s ease infinite; }

      .shimmer {
        background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #111; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #444; }

      .mirror-frame {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        border: 2px solid rgba(59,130,246,0.2);
        box-shadow: 0 0 60px rgba(59,130,246,0.1), inset 0 0 60px rgba(59,130,246,0.02);
      }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border: none;
        color: white;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 30px rgba(59,130,246,0.4);
      }

      .ripple {
        position: relative;
        overflow: hidden;
      }
      .ripple:active::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.1);
        width: 100px; height: 100px;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0);
        animation: ripple-effect 0.4s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
